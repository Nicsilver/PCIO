name: Build & Release APK + AAB

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # Empty until the Play service-account secret is added; the publish step is skipped while empty.
      PLAY_SA_JSON: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}

    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4

      - name: Set up JDK 17
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > PCIO_App/upload-keystore.jks

      - name: Write signing config
        working-directory: PCIO_App
        run: |
          cat > keystore.properties <<EOF
          storeFile=upload-keystore.jks
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          EOF

      - name: Make gradlew executable
        run: chmod +x PCIO_App/gradlew

      - name: Build release APK + AAB
        working-directory: PCIO_App
        run: ./gradlew assembleRelease bundleRelease

      # Only when a tag is pushed; workflow_dispatch just builds (a signing smoke-test).
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          files: |
            PCIO_App/app/build/outputs/apk/release/app-release.apk
          generate_release_notes: true

      # Skipped until PLAY_SERVICE_ACCOUNT_JSON exists and the SA has release access to dk.nicsilver.pcio.
      - name: Publish AAB to Google Play (production)
        if: startsWith(github.ref, 'refs/tags/') && env.PLAY_SA_JSON != ''
        uses: r0adkll/upload-google-play@e738b9dd8f2476ea806d921b64aacd24f34515a5 # v1
        with:
          serviceAccountJsonPlainText: ${{ env.PLAY_SA_JSON }}
          packageName: dk.nicsilver.pcio
          releaseFiles: PCIO_App/app/build/outputs/bundle/release/app-release.aab
          tracks: production
          status: completed
